name: Scrape general lottery results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run general scraper
        run: python -m scripts.scrape_all_states_dom_v6
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: 1

      - name: Run audit bad number counts
        run: python -m scripts.audit_bad_number_counts || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: 1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: general-scrape-reports
          path: |
            all_states_dom_report_v6.json
            audit_bad_number_counts_report.json
            audit_bad_number_counts_report.txt
          if-no-files-found: ignore