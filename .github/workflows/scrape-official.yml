name: scrape-official

on:
  schedule:
    - cron: '0 3,6 * * 2,4,6'   # Martes, Jueves, Sábado a las 3am y 6am UTC (post-draw)
  workflow_dispatch:              # también se puede correr manualmente

jobs:
  scrape-official:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/run_official_scrapers.py --shadow
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
